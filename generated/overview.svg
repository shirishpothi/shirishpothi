  </g>
  <g class="row" style="animation-delay: 360ms" transform="translate(24 150)">
    <circle class="dot" cx="4" cy="-4" r="4" />
    <text class="label" x="20" y="0">Active public repos</text>
    <text class="value" x="396" y="0" text-anchor="end">45</text>
  </g>
<text class="updated" x="24" y="166">Updated 2026-06-05 16:34 UTC</text>
</svg>
