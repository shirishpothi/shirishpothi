name: Update README stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate overview card
        run: python3 scripts/generate_overview.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: shirishpothi

      - name: Commit generated card
        run: |
          if git diff --quiet -- generated/overview.svg; then
            echo "No README stats changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/overview.svg
          git commit -m "Update README stats [skip ci]"
          git push
