name: Generate GitHub Stats

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out stats generator
        uses: actions/checkout@v4
        with:
          repository: jstrieb/github-stats
          ref: master
          path: .github-stats

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Generate stats
        run: |
          cd .github-stats
          zig build
          cd ..
          ./.github-stats/zig-out/bin/github-stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS }}
          EXCLUDE_LANGS: ${{ secrets.EXCLUDE_LANGS }}
          EXCLUDE_PRIVATE: "false"
          SILENT: "true"
          MAX_RETRIES: 5

      - name: Commit generated stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated GitHub stats [skip ci]"
          file_pattern: generated/*.svg

